<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIVUStream</title>
<link rel="stylesheet" href="css/hero.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/navbar.css">
<link rel="stylesheet" href="css/hero.css">
<link rel="stylesheet" href="css/movies.css">
<link rel="stylesheet" href="css/footer.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/loader.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body>

<header class="header">
    <nav class="navbar">

        <div class="logo">
            <span>KIVU</span>Stream
        </div>

        <ul class="nav-links">
            <li><a class="active" href="#">Home</a></li>
            <li><a href="#">Movies</a></li>
            <li><a href="#">TV Shows</a></li>
            <li><a href="#">Latest</a></li>
            <li><a href="#">My List</a></li>
        </ul>

        <div class="nav-right">

            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search movies...">
            </div>

            <button class="login-btn">
                Login
            </button>

        </div>

    </nav>
</header>

<section class="hero" id="hero">

    <div class="hero-backdrop"></div>

    <div class="hero-overlay"></div>

    <div class="hero-content">

        <span class="badge" id="heroBadge">
            Featured
        </span>

        <h1 id="heroTitle">
            Loading...
        </h1>

        <p id="heroDescription">
            Please wait...
        </p>

        <div class="hero-meta">

            <span id="heroRating">
                ⭐ --
            </span>

            <span id="heroYear">
                ----
            </span>

            <span id="heroGenre">
                Genre
            </span>

            <span>
                4K UHD
            </span>

        </div>

        <div class="buttons">

            <button id="playMovie" class="watch-btn">
                <i class="fas fa-play"></i>
                Play
            </button>

            <button id="movieInfo" class="info-btn">
                <i class="fas fa-circle-info"></i>
                Details
            </button>

        </div>

    </div>

</section>
<main>

<section class="movies">

<div class="section-header">

<h2>Trending Now</h2>

<div class="slider-buttons">

<button class="slider-btn left"
data-target="trendingMovies">

<i class="fas fa-chevron-left"></i>

</button>

<button class="slider-btn right"
data-target="trendingMovies">

<i class="fas fa-chevron-right"></i>

</button>

</div>

</div>

<div
class="movie-row"
id="trendingMovies">

</div>

</section>
<section class="movies">

<h2>Recently Added</h2>

<div
class="movie-row"
id="recentMovies">

</div>

</section>

<section class="movies">

<h2>Recommended</h2>

<div
class="movie-row"
id="recommendedMovies">

</div>

</section>
</main>

<footer>

<div class="footer-content">

<div class="logo">
<span>KIVU</span>Stream
</div>

<p>
© 2026 KIVUStream. All rights reserved.
</p>

</div>

</footer>

<script type="module" src="js/script.js"></script>

</body>
</html>
